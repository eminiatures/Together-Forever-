<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Forever ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Together Forever ❤️</h1>

        <p class="subtitle">
            Counting every second of our love
        </p>

        <div class="counter">

            <div class="box">
                <h2 id="days">0</h2>
                <span>Days</span>
            </div>

            <div class="box">
                <h2 id="hours">0</h2>
                <span>Hours</span>
            </div>

            <div class="box">
                <h2 id="minutes">0</h2>
                <span>Minutes</span>
            </div>

            <div class="box">
                <h2 id="seconds">0</h2>
                <span>Seconds</span>
            </div>

        </div>

        <p class="message">
            This clock will stop counting when I marry you. ❤️
        </p>

    </div>

<script src="script.js"></script>

</body>
</html>
